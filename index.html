<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Bãi Xe Thông Minh</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #c0392b;
            --background-color: #f4f6f7;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 25px;
        }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn {
            flex: 1; padding: 12px; text-align: center; background: none; border: none;
            font-size: 16px; font-weight: bold; color: #7f8c8d; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input[type="text"], input[type="file"] {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px;
            box-sizing: border-box; font-size: 16px; text-transform: uppercase;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 4px; font-size: 16px;
            font-weight: bold; color: white; cursor: pointer; margin-top: 10px;
        }
        .btn-in { background-color: var(--success-color); }
        .btn-search { background-color: var(--primary-color); }
        .btn-out { background-color: var(--danger-color); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .preview-box { margin-top: 10px; text-align: center; }
        .preview-box img { max-width: 100%; max-height: 200px; border-radius: 6px; border: 1px solid #ddd; display: none; }
        
        .result-box { background: #eef2f3; padding: 15px; border-radius: 6px; margin-top: 15px; display: none; border-left: 5px solid var(--warning-color); }
        .loading { display: none; text-align: center; font-weight: bold; color: var(--primary-color); margin: 15px 0; }

        /* Khung chứa danh sách nhiều xe */
        .list-cars { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .car-card { background: #fff; border: 2px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .car-card img { max-width: 100%; height: 130px; object-fit: cover; border-radius: 4px; margin: 10px 0; border: 1px solid #eee;}
        .btn-select { background-color: var(--warning-color); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hệ Thống Quản Lý Bãi Xe</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-vao')">XE VÀO</button>
        <button class="tab-btn" onclick="switchTab('tab-ra')">XE RA</button>
    </div>

    <div id="loading" class="loading">Đang xử lý dữ liệu, vui lòng đợi...</div>

    <div id="tab-vao" class="tab-content active">
        <div class="form-group">
            <label for="plateIn">Nhập Biển Số Xe:</label>
            <input type="text" id="plateIn" inputmode="numeric" placeholder="Ví dụ: 59X3-12345">
        </div>
        <div class="form-group">
            <label for="cameraIn">Chụp Hình Ảnh Xe Vào:</label>
            <input type="file" id="cameraIn" accept="image/*" capture="camera" onchange="previewAndCompress(this, 'previewIn')">
        </div>
        <div class="preview-box">
            <img id="previewIn" alt="Ảnh xem trước xe vào">
        </div>
        <button class="btn-in" id="btnSubmitIn" onclick="handleXeVao()">XÁC NHẬN XE VÀO</button>
    </div>

    <div id="tab-ra" class="tab-content">
        <div class="form-group">
            <label for="plateSearch">Nhập Biển Số Xe Ra Để Tìm:</label>
            <input type="text" id="plateSearch" inputmode="numeric" placeholder="Ví dụ: 33">
        </div>
        <button class="btn-search" onclick="handleSearch()">TÌM KIẾM XE</button>

        <!-- Danh sách các xe tìm thấy (Sẽ hiện ra nếu trùng nhiều xe) -->
        <div id="listResults" class="list-cars" style="display: none;"></div>

        <!-- Khung chụp ảnh xe ra (Sẽ ẩn đi cho đến khi chọn 1 xe) -->
        <div id="searchResult" class="result-box">
            <h3>Xác nhận cho xe ra: <span id="selectedPlate" style="color: #c0392b;"></span></h3>
            <p><strong>Thời gian vào:</strong> <span id="resTime"></span></p>
            <div style="text-align:center;"><img id="resImg" src="" style="max-width:100%; max-height:150px; border-radius:4px;"></div>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
            
            <div class="form-group">
                <label for="cameraOut">Chụp Hình Ảnh Xe Ra:</label>
                <input type="file" id="cameraOut" accept="image/*" capture="camera" onchange="previewAndCompress(this, 'previewOut')">
            </div>
            <div class="preview-box">
                <img id="previewOut" alt="Ảnh xem trước xe ra">
            </div>
            <button class="btn-out" id="btnSubmitOut" onclick="handleXeRa()">XÁC NHẬN XE RA & HOÀN THÀNH</button>
        </div>
    </div>
</div>

<script>
    // BẠN HÃY DÁN ĐƯỜNG LINK WEB APP CỦA BẠN VÀO ĐÂY NHÉ:
    const WEB_APP_URL = "DÁN_LINK_VÀO_ĐÂY";

    let globalBase64Image = ""; 
    let currentCarRowIndex = null; 
    let currentMatches = []; // Biến mới để lưu danh sách các xe tìm được

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        resetForm();
    }

    function previewAndCompress(input, previewId) {
        const file = input.files[0];
        const preview = document.getElementById(previewId);
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const MAX_SIZE = 800; 
                if (width > height) {
                    if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                } else {
                    if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                globalBase64Image = canvas.toDataURL('image/jpeg', 0.7);
                preview.src = globalBase64Image;
                preview.style.display = 'block';
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    async function handleXeVao() {
        const plate = document.getElementById('plateIn').value.trim();
        if (!plate) return alert('Vui lòng nhập biển số xe!');
        if (!globalBase64Image) return alert('Vui lòng chụp hình xe vào!');

        toggleLoading(true);
        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'IN', licensePlate: plate, image: globalBase64Image })
            });
            const res = await response.json(); 
            
            if (res.status === 'success') {
                alert('Ghi nhận XE VÀO thành công! Dữ liệu đã vào Sheet.');
                resetForm();
            } else {
                alert('Google báo lỗi: ' + res.message); 
            }
        } catch (error) {
            alert('Lỗi kết nối mạng: ' + error.message);
        }
        toggleLoading(false);
    }

    async function handleSearch() {
        const plate = document.getElementById('plateSearch').value.trim();
        if (!plate) return alert('Vui lòng nhập biển số xe cần tìm!');

        toggleLoading(true);
        document.getElementById('listResults').style.display = 'none';
        document.getElementById('searchResult').style.display = 'none';
        
        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'SEARCH', licensePlate: plate })
            });
            const res = await response.json();
            
            if (res.status === 'success' && res.found) {
                currentMatches = res.matches; // Lưu mảng kết quả
                renderListCars(); // Chạy hàm vẽ danh sách
            } else {
                alert(res.message || 'Không tìm thấy xe.');
            }
        } catch (error) {
            alert('Lỗi tìm kiếm: ' + error.message);
        }
        toggleLoading(false);
    }

    // Hàm tạo giao diện danh sách xe
    function renderListCars() {
        const listDiv = document.getElementById('listResults');
        listDiv.innerHTML = ''; 
        
        if (currentMatches.length === 1) {
            // Nếu chỉ có 1 xe thì tự động Chọn luôn cho nhanh, không cần hỏi
            selectCar(0);
        } else {
            // Nếu có nhiều xe, in ra danh sách các thẻ để người dùng bấm nút Chọn
            let html = `<h3 style="text-align:center; color: var(--primary-color);">Tìm thấy ${currentMatches.length} xe khớp. Hãy chọn đúng xe:</h3>`;
            currentMatches.forEach((car, index) => {
                html += `
                <div class="car-card">
                    <h2 style="margin: 0; color: #c0392b;">${car.plate}</h2>
                    <p style="margin: 5px 0; font-size: 14px; color: #666;">Vào lúc: ${car.entryTime}</p>
                    <img src="${car.entryImg}" alt="Ảnh xe vào">
                    <button class="btn-select" onclick="selectCar(${index})">CHỌN XE NÀY ĐỂ XUẤT BẾN</button>
                </div>`;
            });
            listDiv.innerHTML = html;
            listDiv.style.display = 'flex';
        }
    }

    // Hàm xử lý khi người dùng bấm nút "Chọn xe này"
    function selectCar(index) {
        const car = currentMatches[index];
        currentCarRowIndex = car.rowIndex; 
        
        // Đưa thông tin vào khung xử lý xuất bến
        document.getElementById('selectedPlate').innerText = car.plate;
        document.getElementById('resTime').innerText = car.entryTime;
        document.getElementById('resImg').src = car.entryImg;
        
        document.getElementById('listResults').style.display = 'none'; // Ẩn danh sách
        document.getElementById('searchResult').style.display = 'block'; // Hiện khung chụp ảnh ra
        globalBase64Image = ""; 
    }

    async function handleXeRa() {
        const plate = document.getElementById('selectedPlate').innerText;
        if (!globalBase64Image) return alert('Vui lòng chụp hình xe lúc ra!');
        if (!currentCarRowIndex) return alert('Thiếu dữ liệu định vị dòng, hãy tìm kiếm lại!');

        toggleLoading(true);
        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ 
                    action: 'OUT', 
                    licensePlate: plate, 
                    image: globalBase64Image,
                    rowIndex: currentCarRowIndex 
                })
            });
            const res = await response.json(); 
            
            if (res.status === 'success') {
                alert('Ghi nhận XE RA thành công! Trạng thái đã được chuyển sang [Đã xong].');
                resetForm();
            } else {
                alert('Google báo lỗi: ' + res.message);
            }
        } catch (error) {
            alert('Lỗi khi cho xe ra: ' + error.message);
        }
        toggleLoading(false);
    }

    function toggleLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
        document.querySelectorAll('button').forEach(btn => btn.disabled = show);
    }

    function resetForm() {
        document.getElementById('plateIn').value = "";
        document.getElementById('cameraIn').value = "";
        document.getElementById('previewIn').style.display = 'none';
        document.getElementById('plateSearch').value = "";
        document.getElementById('cameraOut').value = "";
        document.getElementById('previewOut').style.display = 'none';
        document.getElementById('searchResult').style.display = 'none';
        document.getElementById('listResults').style.display = 'none'; // Xóa màn hình danh sách
        globalBase64Image = "";
        currentCarRowIndex = null;
        currentMatches = []; // Xóa bộ nhớ tạm
    }
</script>
</body>
</html>
